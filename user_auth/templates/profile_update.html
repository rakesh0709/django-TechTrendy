{% extends 'main.html' %}
{% block content %}
<div class="container my-5 d-flex justify-content-center">
    <div class="card shadow-sm border-0 p-4 w-100" style="max-width: 500px; border-radius: 1rem;">
        <h2 class="text-center fw-bold mb-4">Update Profile</h2>
        <form action="" method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="first_name" class="form-label fw-semibold">First name</label>
                <input type="text" class="form-control bg-light border-0" id="first_name" name="first_name" value="{{ user.first_name }}">
            </div>
            <div class="mb-3">
                <label for="last_name" class="form-label fw-semibold">Last name</label>
                <input type="text" class="form-control bg-light border-0" id="last_name" name="last_name" value="{{ user.last_name }}">
            </div>
            <div class="mb-4">
                <label for="email" class="form-label fw-semibold">Email</label>
                <input type="email" class="form-control bg-light border-0" id="email" name="email" value="{{ user.email }}">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold">Save changes</button>
        </form>
    </div>
</div>
{% endblock content %}
